<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Para Brenda 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --rose:  #e8a0b4;
    --blush: #f5cfd8;
    --petal: #fce8ed;
    --cream: #fdf6f0;
    --mauve: #c47e9b;
    --deep:  #7a3d58;
    --text:  #5a2d45;
  }

  html, body {
    height: 100%;
  }

  body {
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 30% 20%, #fce4ec 0%, #fdf0f5 40%, #fff5f8 70%, #fce8f0 100%);
    font-family: 'Lato', sans-serif;
    position: relative;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* Floating petals */
  .petal-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .petal-bg span {
    position: absolute;
    opacity: 0.18;
    animation: floatPetal linear infinite;
  }
  @keyframes floatPetal {
    0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.18; }
    90%  { opacity: 0.18; }
    100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
  }

  /* ── STAGE 1 ── */
  #stage-btn {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 26px;
    animation: fadeUp 1.2s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hint-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--mauve);
    font-size: 1.05rem;
    letter-spacing: 0.04em;
  }

  .flower-btn-wrap {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .pulse-ring {
    position: absolute;
    width: 132px;
    height: 132px;
    border-radius: 50%;
    border: 2px solid var(--rose);
    animation: pulseRing 2.4s ease-out infinite;
    pointer-events: none;
  }
  .pulse-ring:nth-child(2) { animation-delay: 0.8s; }
  .pulse-ring:nth-child(3) { animation-delay: 1.6s; }
  @keyframes pulseRing {
    0%   { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(2.1); opacity: 0; }
  }

  .flower-btn {
    width: 132px;
    height: 132px;
    border-radius: 50%;
    border: 2.5px solid var(--rose);
    background: linear-gradient(135deg, #fff0f5 0%, #fce8ed 100%);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 5px;
    box-shadow: 0 4px 28px rgba(196,126,155,0.22), 0 0 0 7px rgba(232,160,180,0.10);
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1);
    position: relative;
    overflow: hidden;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
  }
  .flower-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 32%, rgba(255,255,255,0.65) 0%, transparent 68%);
  }
  .flower-btn:active { transform: scale(0.93); }

  .flower-btn .emoji  { font-size: 2.9rem; line-height: 1; position: relative; z-index: 1; }
  .flower-btn .btn-label {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--mauve);
    font-weight: 400;
    position: relative;
    z-index: 1;
  }

  /* ── STAGE 2 ── */
  #stage-card {
    display: none;
    position: relative;
    z-index: 10;
    width: 100%;
    max-height: 100vh;
    max-height: -webkit-fill-available;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 24px 18px 32px;
  }

  .card {
    width: min(400px, 100%);
    margin: 0 auto;
    background: linear-gradient(160deg, #fff8fa 0%, #fdf0f5 60%, #fce8ee 100%);
    border-radius: 28px;
    box-shadow:
      0 2px 0 rgba(255,255,255,0.9) inset,
      0 28px 70px rgba(122,61,88,0.13),
      0 8px 22px rgba(196,126,155,0.10);
    border: 1px solid rgba(232,160,180,0.35);
    padding: 44px 34px 40px;
    position: relative;
    overflow: hidden;
    animation: cardReveal 0.9s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes cardReveal {
    0%   { opacity: 0; transform: scale(0.84) translateY(44px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  .card-deco {
    position: absolute;
    font-size: 1.9rem;
    opacity: 0.19;
    pointer-events: none;
  }
  .card-deco.tl { top: 13px; left: 13px; transform: rotate(-25deg); }
  .card-deco.tr { top: 13px; right: 13px; transform: rotate(25deg) scaleX(-1); }
  .card-deco.bl { bottom: 13px; left: 13px; transform: rotate(15deg); }
  .card-deco.br { bottom: 13px; right: 13px; transform: rotate(-15deg) scaleX(-1); }

  .card-line {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--rose), transparent);
    margin: 0 -8px 28px;
    opacity: 0.48;
  }

  .bouquet {
    text-align: center;
    font-size: clamp(2.8rem, 13vw, 4.2rem);
    line-height: 1.1;
    margin-bottom: 26px;
    animation: bouquetFloat 0.8s 0.3s cubic-bezier(.34,1.56,.64,1) both;
    filter: drop-shadow(0 5px 14px rgba(196,126,155,0.22));
  }
  @keyframes bouquetFloat {
    0%   { opacity: 0; transform: scale(0.4) rotate(-10deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  .to-name {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--mauve);
    font-size: 1rem;
    text-align: center;
    margin-bottom: 6px;
    opacity: 0;
    animation: fadeIn 0.6s 0.7s ease both;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    color: var(--deep);
    font-size: clamp(1.15rem, 4.5vw, 1.5rem);
    font-weight: 500;
    text-align: center;
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeIn 0.6s 0.85s ease both;
  }

  .card-message {
    font-size: 0.96rem;
    color: var(--text);
    line-height: 1.82;
    text-align: center;
    font-weight: 300;
    opacity: 0;
    animation: fadeIn 0.7s 1.05s ease both;
  }

  .card-sign {
    margin-top: 30px;
    text-align: right;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--mauve);
    font-size: 1rem;
    opacity: 0;
    animation: fadeIn 0.7s 1.35s ease both;
  }

  .card-footer {
    margin-top: 28px;
    display: flex;
    justify-content: center;
    opacity: 0;
    animation: fadeIn 0.6s 1.6s ease both;
  }
  .petal-row { font-size: 1.25rem; letter-spacing: 4px; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    animation: confettiFall var(--dur) var(--delay) cubic-bezier(.25,.46,.45,.94) both;
  }
  @keyframes confettiFall {
    0%   { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), 100vh) rotate(var(--rot)) scale(0.4); opacity: 0; }
  }
</style>
</head>
<body>

<div class="petal-bg" id="petalBg"></div>

<!-- Stage 1: Button -->
<div id="stage-btn">
  <p class="hint-text">algo chegou para você...</p>
  <div class="flower-btn-wrap">
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <button class="flower-btn" onclick="openCard()" aria-label="Abrir presente">
      <span class="emoji">🌸</span>
      <span class="btn-label">toque aqui</span>
    </button>
  </div>
</div>

<!-- Stage 2: Card -->
<div id="stage-card">
  <div class="card">
    <span class="card-deco tl">🌸</span>
    <span class="card-deco tr">🌸</span>
    <span class="card-deco bl">🌺</span>
    <span class="card-deco br">🌺</span>

    <div class="bouquet">💐🌹🌸</div>
    <div class="card-line"></div>

    <p class="to-name">Para Brenda,</p>
    <h1 class="card-title">Feliz Dia das Mulheres</h1>

    <p class="card-message">
      Como você me pediu para não te mandar flores na sua casa, encontrei outra forma de te mandar.<br><br>
      Espero que você goste, porque você merece flores, de qualquer forma e de qualquer lugar.
    </p>

    <p class="card-sign">com carinho, Daniel 🩵</p>

    <div class="card-footer">
      <span class="petal-row">🌷🌸🌼🌺🌹</span>
    </div>
  </div>
</div>

<script>
  // Floating petals
  const petalBg = document.getElementById('petalBg');
  const symbols = ['🌸','🌺','🌹','🌷','🌼'];
  for (let i = 0; i < 20; i++) {
    const s = document.createElement('span');
    s.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    s.style.left              = Math.random() * 100 + 'vw';
    s.style.bottom            = '-10vh';
    s.style.animationDuration = (14 + Math.random() * 18) + 's';
    s.style.animationDelay    = (Math.random() * 22) + 's';
    s.style.fontSize          = (10 + Math.random() * 12) + 'px';
    petalBg.appendChild(s);
  }

  function openCard() {
    document.getElementById('stage-btn').style.display = 'none';
    const card = document.getElementById('stage-card');
    card.style.display = 'block';
    launchConfetti();
  }

  function launchConfetti() {
    const colors = ['#e8a0b4','#f5cfd8','#d4a373','#c47e9b','#fce8ed','#7a3d58','#ffe4e8','#b5e4f7'];
    const cx = window.innerWidth  / 2;
    const cy = window.innerHeight / 3;
    for (let i = 0; i < 55; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const angle = Math.random() * 360;
      const dist  = 60 + Math.random() * 160;
      const tx    = Math.cos(angle * Math.PI / 180) * dist + (Math.random() - 0.5) * 60;
      const size  = 5 + Math.random() * 7;
      el.style.cssText = `
        left:${cx}px; top:${cy}px;
        width:${size}px; height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${Math.random()>0.5?'50%':'2px'};
        --tx:${tx}px;
        --rot:${Math.random()*720-360}deg;
        --dur:${1.2+Math.random()*1.4}s;
        --delay:${Math.random()*0.35}s;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3200);
    }
  }
</script>
</body>
</html>
